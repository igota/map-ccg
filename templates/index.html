<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAPA CIRURGICO - Login</title>
    <style>
        /* Estilos da tela de carregamento */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.8);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            
            z-index: 1000;
            visibility: hidden; /* Inicialmente oculto */
        }
        
        html,body{
            height: 100%;
            font-family: "Poppins", sans-serif!important;
            background-color: #206a6d
        }

        /* Estilos do formulário de login */
        .conteiner {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
           
            height: 100%; /* Ocupa toda a altura da janela */
            
                  
        }

        .base{
            position: absolute;
            
                    
        }
        

        .logo {
            max-width: 300px; /* Largura máxima do logo */
            height: auto; /* Mantém a proporção da imagem */
            margin-bottom: 20px; /* Espaço abaixo do logo */
        }
        
        h1 {
            margin-bottom: 20px;
            color: #333;
            
        }

        form {
            background-color: rgba(255, 255, 255, 0.8); /* Uma cor de fundo opcional com transparência */
            background-image: 
            linear-gradient(-135deg, #ecf0f1, rgba(206, 202, 202, 0.7)); /* Degradê vermelho */
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 12px 15px 0 rgba(0, 0, 0, .24), 0 17px 50px 0 rgba(0, 0, 0, .19);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 450px;
            height: 550px;
            margin-bottom: 20px;
        }

        .logos{
            font-size: 1rem;
            font-weight: 400;
            color: #212529;
            margin-top: 20px;
            padding: 0;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 10px;
            gap: 20px;
            
        
        }

        .logomapa{
            display: block;
            margin: auto;
            width: 12rem;
            margin-bottom: 20px;
        }

        .logoisgh{
            font-size: 1rem;
            font-weight: 400;
            color: #212529;
            width: 7rem;
            
        }

        .logohrn{
            font-size: 1rem;
            font-weight: 400;
            color: #212529;
            width: 6rem;
        }

        .separator {
        width: 1.5px; /* Define a largura do traço */
        height: 35px; /* Altura do traço, ajuste conforme necessário */
        background-color: #333; /* Cor do traço */
        }

        label {
            margin-bottom: 5px;
            color: #333232;
        }

        input {
            
            box-sizing: border-box;
            display: block!important;
            padding: 1rem !important;
            font-size: 1rem !important;
            color: #283965E6 !important;
            transition: border 150ms cubic-bezier(0.4,0,0.2,1) !important;
            border: solid 1.5px #283965E6 !important;
            border-radius: 0.9rem !important;
            background: rgba(255, 253, 253, 0.742) !important;
            width: 100%;
            font-family: Arial,Verdana,sans-serif;
            margin-bottom: 20px;
            
        }
        input[type="text"]::placeholder {
            text-transform: none; /* Remove o uppercase do placeholder */
            
        }
        p{
            color: red;
            margin: 0 auto !important;
            padding-top: 10px;
            

        }

        

        .password-container input {
                width: 100%;
                margin-bottom: 30px;
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 4px;
                font-size: 14px;
                border-radius: 4px;
                font-size: 14px;
                
        }
       

        .button {
            padding: 10px 10px 10px 5px!important;
            background-color: #0036e7;
            color: #fff;
            border: none!important;
            padding: 10px 10px 10px 5px!important;
            display: block!important;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-family: "Poppins", sans-serif!important;
            transition: all 0.5s ease;
            margin: 0 auto !important;
            width:200px;
            text-transform: uppercase;
            border-radius: 25px;
            box-sizing: border-box;
            
        }
        

        .button:hover {
            background-color: #83daf0;
            color: #000;
        }

        
        .password-container button {
            position: absolute;
            right: 11px;
            cursor: pointer;
            padding-bottom: 25px;
            background: none;
            border: none;
            font-size: 16px;
            color: #555;
        }
        .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }
    

        .footer-content {
        margin-top: auto; /* Isso empurra o rodapé para o fundo do contêiner */
        text-align: center; 
        }

        .doe {
            font-size: 15px; /* Tamanho da fonte do rodapé */
            color: #ffffff; /* Cor do texto do rodapé */
        }

        .rodape{
            font-size: 12px;
            color:  #ffffff;
            padding-bottom: 20px;
        }
        .uppercase {
            text-transform: uppercase; /* Transforma o texto em caixa alta */
        }
        

       

        
      
        
    </style>
</head>
<body onload="document.getElementsByName('login')[0].focus();">
    <!-- Tela de carregamento -->
    <div id="loading" style="visibility: hidden;">Entrando<span id="drop-container"></span></div>
<div class="conteiner">
    
    <div class="base">
        
        <form method="POST" action="/login" autocomplete="off" onsubmit="showLoading()">

            
            <img src="{{ url_for('static', filename='img/map.png') }}" alt="Logo MAPA" class="logomapa">

            <input type="text" name="login" placeholder="Login" required autocomplete="off" class="uppercase">
            
            <div class="password-container">
                <input type="password" name="senha" placeholder="Senha" id="password" required autocomplete="off">
                <button type="button" class="toggle-password" onclick="togglePassword()">
                    <svg  id="eye-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 4.5C7 4.5 2.73 7.61 1 12C2.73 16.39 7 19.5 12 19.5C17 19.5 21.27 16.39 23 12C21.27 7.61 17 4.5 12 4.5ZM12 17C9.24 17 7 14.76 7 12C7 9.24 9.24 7 12 7C14.76 7 17 9.24 17 12C17 14.76 14.76 17 12 17ZM12 9.5C10.62 9.5 9.5 10.62 9.5 12C9.5 13.38 10.62 14.5 12 14.5C13.38 14.5 14.5 13.38 14.5 12C14.5 10.62 13.38 9.5 12 9.5Z" fill="black"/>
                        <line x1="2" y1="2" x2="22" y2="22" stroke="black" stroke-width="2"/>
                    </svg>
                </button>
            </div>
            <button class="button" type="submit">Entrar</button>
            <div class="logos">
                <img src="{{ url_for('static', filename='img/Logo-ISGH.png') }}" alt="Logo ISGH" class="logoisgh">
                <div class="separator"></div>
                <img src="{{ url_for('static', filename='img/Logo-HRN.png') }}" alt="Logo HRN" class="logohrn">
            </div>
            
            {% if error %}
                <p>{{ error }}</p>
            {% elif success %}
                <p style="color: green;">{{ success }}</p>    
            {% endif %}
           
        </form>

        
        
    </div>
    
    <div class="footer-content">

        <p class="rodape">&copy; SISTEMA MAPA CIRÚRGICO | ISGH - INSTITUTO DE SAÚDE E GESTÃO HOSPITALAR. <BR/> Powered by Igor Maciel - Todos os direitos reservados.</p>

    </div>
    
</div>
    
 
    

    <style>
        /* Gota de sangue usando SVG */
        #drop-container {
            display: inline-block;
            position: relative;
            width: 15px;
            height: 20px;
            margin-left: 5px;
            bottom: 12px; /* Ajuste vertical */
        }

        .drop {
            position: absolute;
            width: 15px;
            height: 25px;
            animation: dropAnimation 800ms infinite;
        }

        /* Animação da queda da gota */
        @keyframes dropAnimation {
            0% { transform: translateY(0); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(20px); opacity: 0; }
        }
    </style>

    <script>
        // Mostra a tela de carregamento ao enviar o formulário
        function showLoading() {
            document.getElementById('loading').style.visibility = 'visible';
            startDropAnimation();
        }

        // Função para criar e animar gotas de sangue com ícone
        function startDropAnimation() {
            const dropContainer = document.getElementById('drop-container');

            // Adiciona uma gota a cada 1 segundo
            setInterval(() => {
                const drop = document.createElement('div');
                drop.classList.add('drop');
                
                // Adiciona o SVG de gota de sangue ao elemento
                drop.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="27" height="23" viewBox="0 0 24 24" fill="red">
                        <path d="M12 2C11.6 2 11.3 2.2 11 2.4C10.6 2.7 5 8.4 5 13.5C5 17.6 8.4 21 12.5 21C16.6 21 20 17.6 20 13.5C20 8.4 14.4 2.7 14 2.4C13.7 2.2 13.4 2 13 2H12z"/>
                    </svg>
                `;
                
                // Remove a gota após a animação para manter o container limpo
                drop.addEventListener('animationend', () => drop.remove());

                dropContainer.appendChild(drop);
            }, 800); // A cada 1 segundo
        }

        
        // Alterna a visibilidade da senha
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const passwordButton = document.querySelector('.toggle-password');

            // Defina os SVGs para "olho aberto" e "olho fechado"
            const eyeOpenSVG = `
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12C2.73 16.39 7 19.5 12 19.5C17 19.5 21.27 16.39 23 12C21.27 7.61 17 4.5 12 4.5ZM12 17C9.24 17 7 14.76 7 12C7 9.24 9.24 7 12 7C14.76 7 17 9.24 17 12C17 14.76 14.76 17 12 17ZM12 9.5C10.62 9.5 9.5 10.62 9.5 12C9.5 13.38 10.62 14.5 12 14.5C13.38 14.5 14.5 13.38 14.5 12C14.5 10.62 13.38 9.5 12 9.5Z" fill="black"/>
                </svg>`;
            const eyeClosedSVG = `
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12C2.73 16.39 7 19.5 12 19.5C17 19.5 21.27 16.39 23 12C21.27 7.61 17 4.5 12 4.5ZM12 17C9.24 17 7 14.76 7 12C7 9.24 9.24 7 12 7C14.76 7 17 9.24 17 12C17 14.76 14.76 17 12 17ZM12 9.5C10.62 9.5 9.5 10.62 9.5 12C9.5 13.38 10.62 14.5 12 14.5C13.38 14.5 14.5 13.38 14.5 12C14.5 10.62 13.38 9.5 12 9.5Z" fill="black"/>
                    <line x1="2" y1="2" x2="22" y2="22" stroke="black" stroke-width="2"/>
                </svg>`;

            // Alterna o tipo do campo e o ícone
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                passwordButton.innerHTML = eyeOpenSVG; // Ícone de esconder
            } else {
                passwordField.type = 'password';
                passwordButton.innerHTML = eyeClosedSVG; // Ícone de mostrar
            }
        }
    </script>


</body>
</html>
